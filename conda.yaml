name: plants-mlflow-env

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Scientific stack
  - numpy=1.26.*
  - pandas=2.1.*
  - scikit-learn=1.4.*
  - matplotlib=3.8.*

  # Image processing (for preprocessing pipeline)
  - pillow=10.*

  - pip:
      - mlflow>=2.12,<3.0
      - seaborn>=0.13
